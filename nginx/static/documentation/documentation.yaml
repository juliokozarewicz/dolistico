servers:
  - url: PUBLIC_DOMAIN_REPLACE
info:
  title: DOLISTICO
  version: "1.0"
  description: |-
  
    # About
    
    Dolistico is a lightweight and scalable microservice for managing 
    to-do tasks, built with Java and Spring. Designed to integrate 
    seamlessly into a microservices architecture, it allows users to 
    create, update, delete, and organize personal tasks and agendas 
    securely. With support for JWT authentication, user account 
    management, and features like due dates, categorization, and 
    ownership enforcement, Dolistico ensures that 
    task management is both secure and efficient.
    
    <br>
    
    # Response Pattern

    All API responses, whether successful or error, follow a standardized structure 
    to ensure consistency across the system. Each response includes a `messageCode`, 
    which uniquely identifies the result of the operation.
    
    This `messageCode` acts as a machine-readable key that maps to a human-readable 
    message in English (en-US). Clients should rely on this code to interpret the 
    outcome, display appropriate messages, or trigger specific behaviors, ensuring 
    consistency and simplifying integration.
    
    It is also possible to translate response messages to other languages by keeping 
    the same `messageCode` keys and replacing only the message text. This allows 
    localization without impacting the API contract.
    
    <br>
    
    ## Success Response Structure
    
    Every successful response contains the following base fields:

    * **timestamp** — The date and time when the response was generated (ISO 8601 format).
    * **statusCode** — The HTTP status code returned by the server (e.g., 200, 201).
    * **messageCode** — A machine-readable code representing the success type.
    
    Additional Fields
    
    Depending on the operation, the response may include the following optional fields:
    
    * **data**  — Contains the main payload returned by the operation, such as created 
      resource identifiers, retrieved entities, or result objects.
    * **meta** — Provides additional contextual information, such as pagination details, 
      totals, or other metadata relevant to the request.
    * **links** — Contains navigation or related resource links (e.g., HATEOAS).
    
    Example:
    
    ```json
    {
      "timestamp": "2026-03-11T11:20:40Z",
      "statusCode": 200,
      "messageCode": "TASKS_RETRIEVED_SUCCESSFULLY",
      "data": [
        {
          "idCreated": "464140a1-cbec-4935-a604-e7decf33d6d9",
          "createdAt": "2026-03-11T09:00:00",
          "updatedAt": "2026-03-11T10:00:00",
          "taskName": "Finish backend documentation",
          "description": "Write the API documentation for the tasks module.",
          "category": {
            "id": "0f5b7c74-9c3b-4c3a-9a45-bcfd3c6d7a1e",
            "categoryName": "Work"
          },
          "color": "blue",
          "priority": 3,
          "startTime": "2026-03-11T09:00:00",
          "endTime": "2026-03-11T10:00:00",
          "location": "Office meeting room",
          "allDay": false,
          "reminderTime": "2026-03-11T08:30:00",
          "notifyActive": true,
          "status": "pending",
          "dueDate": "2026-03-11T10:00:00"
        }
      ],
      "meta": {
        "currentPage": 1,
        "totalPages": 1,
        "totalElementsCurrentPage": 1,
        "pageSize": 10,
        "totalElements": 1
      }
    }
    ```

    <br>

    ## Error Response Structure

    Every error response contains the following base fields:

    * **timestamp** — The date and time when the error occurred (ISO 8601 format).
    * **statusCode** — The HTTP status code returned by the server.
    * **messageCode** — A machine-readable code representing the error type.
    
    Example:
    
    ```json
    {
        "timestamp": "2026-02-27T19:53:14Z",
        "statusCode": 401,
        "messageCode": "INVALID_CREDENTIALS"
    }
    ```
    
    <br>
    
    When validation fails for request inputs (such as request body, query parameters, 
    path parameters, or form fields), the API returns a `422 Unprocessable Entity` status code. 
    In these cases, the response includes an additional field called `fieldErrors`.

    This field contains a list of invalid fields along with their respective 
    error codes, allowing clients to identify exactly which inputs failed 
    validation and why.
    
    Example:
    
    ```json
    {
        "timestamp": "2026-02-27T19:55:12Z",
        "statusCode": 422,
        "messageCode": "UNPROCESSABLE_ENTITY",
        "fieldErrors": [
            {
                "field": "subject",
                "fieldMessageCode": "HELLOWORLD_FIELD_CANNOT_BE_EMPTY_DTO"
            },
            {
                "field": "message",
                "fieldMessageCode": "HELLOWORLD_FIELD_CANNOT_BE_EMPTY_DTO"
            }
        ]
    }
    ```

    <br>

    ## Message Codes Reference
    
    The complete list of `messageCode` values and their corresponding messages 
    used by the API is available for download in JSON format.

    These codes provide a consistent way to identify API responses, making it easier 
    to implement application logic, handle errors, and support message localization.
    
    <a href="PUBLIC_DOMAIN_REPLACE/DOCUMENTATION_REPLACE/message_code.json" target="_blank" download>
      Download Message Codes
    </a>

    <br>

    # Postman
    Here you will find the Postman collection for testing the API endpoints. The 
    collection allows you to run requests in a practical and organized way, with 
    preconfigured examples to make usage easier. It helps you validate responses, 
    check API behavior, and simulate different scenarios.

    It also supports more consistent and efficient testing for both development 
    and system integration. Simply import the file into Postman, configure the 
    required environment variables, and start testing the endpoints quickly and 
    efficiently.
    
    <a href="PUBLIC_DOMAIN_REPLACE/DOCUMENTATION_REPLACE/postman_collection.json" target="_blank" download>
      Download The Postman Collection
    </a>


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  ########################################################## ( helloworld init )

  # Hello World
  "/HELLOWORLD_BASE_URL_REPLACE":
    get:
      summary: Get hello world message
      description: >-
        Retrieves a hello world message. If the message parameter is not
        provided or is empty, the default value "Hello World!" will be returned.
        If the message equals "bad-message", a business rule error will be triggered.
      tags:
        - Hello World
      parameters:
        - name: message
          in: query
          required: false
          description: Custom message to be validated and returned.
          schema:
            type: string
            maxLength: 256
            example: Hello from the API!
      responses:
        "200":
          description: Successful response with validated hello world message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-03-05T11:38:17Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: HELLOWORLD_CREATED_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: test_message

        "403":
          description: >-
            Business rule violation. Triggered when the provided
            message equals "bad-message".
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-03-05T11:38:17Z"
                  statusCode:
                    type: integer
                    example: 403
                  messageCode:
                    type: string
                    example: NO_PERMISSION_TO_ACCESS

  ########################################################### ( helloworld end )

  ############################################################ ( accounts init )

  # ACCOUNTS - CREATE
  "/ACCOUNTS_BASE_URL_REPLACE/create":
    post:
      summary: Create account
      description: |-
        Creates a new user account by registering the user's information, initializing default settings and permissions.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  description: >-
                    Full name of the user. Must be between 3 and 256 characters.
                    The characters `< > & ' " /` are not allowed.
                  minLength: 3
                  maxLength: 256
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  description: >-
                    Valid email address. Maximum 256 characters.
                    Used as the account identifier and login username.
                  maxLength: 256
                  example: jane.doe@example.com
                password:
                  type: string
                  format: password
                  description: >-
                    Account password. Must be between 12 and 256 characters and contain
                    at least one uppercase letter, one lowercase letter, one digit, and
                    one special character (! @ # $ % ^ & *).
                    The characters `< > & ' " /` are not allowed.
                  minLength: 12
                  maxLength: 256
                  example: "MyStr0ng!Pass"
      responses:
        "201":
          description: Account created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-07T10:00:00Z"
                  statusCode:
                    type: integer
                    example: 201
                  messageCode:
                    type: string
                    example: ACCOUNTS_CREATED_SUCCESSFULLY

  # ACCOUNTS - UPDATE PASSWORD REQUEST
  "/ACCOUNTS_BASE_URL_REPLACE/password/update/request":
    post:
      summary: Request password reset link
      description: Sends a password reset link to the provided email address.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 256
                  example: johndoe@email.com
      responses:
        "200":
          description: Request processed successfully. A reset link will be sent if the email is registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_PASSWORD_LINK_SUCCESSFULLY

  # ACCOUNTS - UPDATE PASSWORD CONFIRM
  "/ACCOUNTS_BASE_URL_REPLACE/password/update/confirm":
    patch:
      summary: Update password
      description: |-
        Finalizes the password reset flow by validating the token received by email
        and updating the user's password.

        After a successful update:
        - The token is immediately invalidated (single use).
        - A confirmation email is sent to the user.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: >-
                    Hexadecimal token received via email link. Must be between 126 and 1024 characters.
                  minLength: 126
                  maxLength: 1024
                  example: "a3f9c2e1b7d04f8a..."
                newPassword:
                  type: string
                  format: password
                  description: >-
                    New password. Must be between 12 and 256 characters and contain at least
                    one uppercase letter, one lowercase letter, one digit, and one special character
                    (! @ # $ % ^ & *). The characters < > & ' " / are not allowed.
                  minLength: 12
                  maxLength: 256
                  example: "MyStr0ng!Pass"
      responses:
        "200":
          description: Password updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_UPDATE_PASSWORD_SUCCESSFULLY

  # ACCOUNTS - LOGIN REQUEST
  "/ACCOUNTS_BASE_URL_REPLACE/login/request":
    post:
      summary: Login request
      description: |-
        First step of the two-factor authentication flow. Validates the user’s 
        credentials (email and password). If the credentials are correct, 
        a PIN code is generated and sent to the user’s registered email address.
        
        The returned `userLoginToken` is required for the next step and must be 
        submitted together with the PIN to complete authentication and obtain 
        the access and refresh tokens.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 256
                  example: johndoe@email.com
                password:
                  type: string
                  format: password
                  minLength: 12
                  maxLength: 256
                  example: "MyStr0ng!Pass"
      responses:
        "200":
          description: Credentials validated. A PIN was sent to the user's email.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_LOGIN_REQUEST_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      userLoginToken:
                        type: string
                        description: Temporary token to be used in the login confirm step.
                        example: "a3f9c2e1b7d04f8a..."

  # ACCOUNTS - LOGIN CONFIRM
  "/ACCOUNTS_BASE_URL_REPLACE/login/confirm":
    post:
      summary: Login confirm
      description: |-
        In this final step, the endpoint validates the `userLoginToken` obtained 
        in the previous step together with the PIN sent via email. If the 
        validation is successful, the API returns an access token and a refresh
         token, and also sends a notification email informing the user about 
         a login from a new device.

        The access token has a short lifespan, lasting a few minutes, and is used 
        to authenticate API requests. The refresh token has a longer validity 
        period of 30 days and is used exclusively to obtain a new access token 
        when the current one expires.

        When the access token expires, the API returns a 401 Unauthorized status. 
        The `messageCode` is `ACCESS_EXPIRED`, indicating that the token is no 
        longer valid. In this case, the client does not need to repeat the 
        full login flow; instead, it should use the refresh token to request 
        a new access token, keeping the session active.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userLoginToken
                - pin
              properties:
                userLoginToken:
                  type: string
                  description: Temporary token received from the login request step.
                  minLength: 126
                  maxLength: 1024
                  example: "a3f9c2e1b7d04f8a..."
                pin:
                  type: string
                  description: 6-digit PIN sent to the user's email.
                  example: "482910"
      responses:
        "200":
          description: Authentication completed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_LOGIN_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      access:
                        type: string
                        description: Encrypted access token to be used in authenticated requests.
                        example: "eyJhbGciOiJSUzI1NiIsInR5..."
                      refresh:
                        type: string
                        description: Encrypted refresh token to obtain a new access token when expired.
                        example: "dGhpcyBpcyBhIHJlZnJlc2g..."
                      accessExpiresAt:
                        type: string
                        format: date-time
                        description: Timestamp indicating when the access token expires.
                        example: "2026-05-21T19:47:01Z"
                      refreshExpiresAt:
                        type: string
                        format: date-time
                        description: Timestamp indicating when the refresh token expires.
                        example: "2026-05-28T18:47:01Z"

  # ACCOUNTS - LOGIN REFRESH
  "/ACCOUNTS_BASE_URL_REPLACE/login/refresh":
    post:
      summary: Login refresh
      description: >-
        Obtains a new access token using a valid refresh token,
        without requiring the user to go through the full two-factor authentication flow again.
        Returns a new access token and a rotated refresh token with updated expiration times.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Encrypted refresh token obtained from the login confirm step.
                  minLength: 128
                  maxLength: 2048
                  example: "dGhpcyBpcyBhIHJlZnJlc2g..."
      responses:
        "200":
          description: Token refreshed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_LOGIN_REFRESH_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      access:
                        type: string
                        description: New encrypted access token to be used in authenticated requests.
                        example: "eyJhbGciOiJSUzI1NiIsInR5..."
                      refresh:
                        type: string
                        description: New encrypted refresh token replacing the previous one.
                        example: "dGhpcyBpcyBhIHJlZnJlc2g..."
                      accessExpiresAt:
                        type: string
                        format: date-time
                        description: Timestamp indicating when the new access token expires.
                        example: "2026-05-21T19:47:01Z"
                      refreshExpiresAt:
                        type: string
                        format: date-time
                        description: Timestamp indicating when the new refresh token expires.
                        example: "2026-05-28T18:47:01Z"

  # ACCOUNTS - LOGOUT
  "/ACCOUNTS_BASE_URL_REPLACE/logout":
    post:
      summary: Logout
      description: >-
        Invalidates the user's session globally by revoking the provided refresh token. 
        After a successful logout, both the access and refresh tokens are no longer valid.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Refresh token obtained from the login confirm or login refresh step.
                  minLength: 128
                  maxLength: 2048
                  example: "dGhpcyBpcyBhIHJlZnJlc2g..."
      responses:
        "200":
          description: Logout completed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_LOGOUT_SUCCESSFULLY

  # ACCOUNTS - GET PROFILE
  "/ACCOUNTS_BASE_URL_REPLACE/profile":
    get:
      summary: Get profile
      description: >-
        Retrieves the profile information of the authenticated user.
      tags:
        - Accounts
      security:
        - BearerAuth: [ ]
      responses:
        "200":
          description: Profile retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_PROFILE_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      createdAt:
                        type: string
                        format: date-time
                        example: "2026-05-01T10:00:00Z"
                      updatedAt:
                        type: string
                        format: date-time
                        example: "2026-05-21T18:47:01Z"
                      profileImage:
                        type: string
                        nullable: true
                        example: "https://cdn.example.com/profiles/avatar.jpg"
                      email:
                        type: string
                        example: "janedoe@email.com"
                      fullName:
                        type: string
                        example: "Jane Doe"
                      phone:
                        type: string
                        nullable: true
                        example: "+5541999999999"
                      identityDocument:
                        type: string
                        nullable: true
                        example: "123.456.789-00"
                      gender:
                        type: string
                        nullable: true
                        example: "female"
                      birthdate:
                        type: string
                        nullable: true
                        example: "1990-06-15"
                      biography:
                        type: string
                        nullable: true
                        example: "Software engineer and coffee enthusiast."
                      language:
                        type: string
                        nullable: true
                        example: "en-US"
                      theme:
                        type: string
                        nullable: true
                        example: "dark"

    # ACCOUNTS - UPDATE PROFILE
    patch:
      summary: Update profile
      description: >-
        Updates the profile information of the authenticated user.
        All fields are optional. Only the fields provided will be updated.
      tags:
        - Accounts
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 3
                  maxLength: 256
                  example: Jane Doe
                phone:
                  type: string
                  description: Digits, spaces, parentheses, hyphens, and leading + are allowed.
                  minLength: 1
                  maxLength: 25
                  example: "+5541999999999"
                identityDocument:
                  type: string
                  minLength: 1
                  maxLength: 256
                  example: "123.456.789-00"
                gender:
                  type: string
                  minLength: 1
                  maxLength: 256
                  example: female
                birthdate:
                  type: string
                  description: Date in YYYY-MM-DD format.
                  pattern: "^\\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])$"
                  example: "1990-06-15"
                biography:
                  type: string
                  minLength: 1
                  maxLength: 256
                  example: Software engineer and coffee enthusiast.
                language:
                  type: string
                  description: Letters and hyphens only.
                  minLength: 1
                  maxLength: 50
                  example: en-US
                theme:
                  type: string
                  description: Letters and hyphens only.
                  minLength: 1
                  maxLength: 100
                  example: dark
      responses:
        "200":
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-21T18:47:01Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: ACCOUNTS_PROFILE_UPDATED_SUCCESSFULLY

  ############################################################# ( accounts end )

  ############################################################### ( tasks init )

  # CATEGORIES - CREATE
  "/TASKS_BASE_URL_REPLACE/category":
    post:
      summary: Create category
      description: |-
        Creates a new category for the authenticated user. Categories are used
        to organize and group tasks. Each category name must be unique per user.

        **Business rules:**

        - `categoryName` must not be blank, must have at least 3 characters, and must not exceed 255 characters.
        - A duplicate category is detected when the same user already has a category with the same `categoryName`.
      tags:
        - Tasks
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryName
              properties:
                categoryName:
                  type: string
                  description: Name of the category. Must be unique per user.
                  minLength: 3
                  maxLength: 255
                  example: Work
      responses:
        "201":
          description: Category created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-04-09T19:13:56Z"
                  statusCode:
                    type: integer
                    example: 201
                  messageCode:
                    type: string
                    example: TASKS_CATEGORIES_CREATED_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      idCreated:
                        type: string
                        format: uuid
                        example: 6a1dd3c0-2f6e-48fc-b995-45daf63ab942

    # CATEGORIES - GET
    get:
      summary: Get categories
      description: >-
        Retrieves a paginated list of categories for the authenticated user.
        All query parameters are optional and act as filters.
        Results are sorted by creation date in descending order.
      tags:
        - Tasks
      security:
        - BearerAuth: [ ]
      parameters:
        - name: pageSize
          in: query
          required: false
          description: Number of items per page. Must be between 1 and 100. Defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - name: pageNumber
          in: query
          required: false
          description: Page number to retrieve. Must be at most 100. Defaults to 1.
          schema:
            type: integer
            maximum: 100
            example: 1
        - name: categoryName
          in: query
          required: false
          description: Filter by category name. Must be between 3 and 255 characters. Special characters are not allowed.
          schema:
            type: string
            minLength: 3
            maxLength: 255
            example: credit card

      responses:
        "200":
          description: Categories retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-04-10T15:17:05Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
