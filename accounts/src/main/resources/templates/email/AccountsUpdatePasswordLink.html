<!DOCTYPE html>
<html lang="{{ language }}">

<head>
    <meta charset="UTF-8" />
</head>

<body style="
    margin: 0;
    padding: 0;
    width: 100%;
    line-height:10px;
">

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">

        <tr>
            <td align="center">

                <!-- CONTAINER -->
                <table role="presentation"
                    cellspacing="0"
                    cellpadding="0"
                    border="0"
                    style="width:100%; max-width:1200px">

                    <!-- CONTENT -->
                    <tr>
                        <td style="
                            font-size:15px;
                            color:#000000;
                        ">

                            <p style="font-size:15px;">{{ email_greeting }}</p>

                            <br/>

                            <p style="font-size:15px;">{{ email_reset_password_click }}</p>

                            <!-- BUTTON -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                                <tr>
                                    <td bgcolor="#000000" style="
                                        padding-top: 10px;
                                        padding-bottom: 10px;
                                        padding-left: 10px;
                                        padding-right: 10px;
                                        border-radius: 6px;
                                        border:3px solid #ffffff;
                                    ">

                                        <a href="{{ commandURL }}" style="
                                            color:#ffffff;
                                            text-decoration:none;
                                            font-weight:bold;
                                            font-size:15px;
                                            font-family:Arial,sans-serif;
                                            display:inline-block;
                                            border-radius: 6px;
                                        ">
                                            {{ email_click_here_link }}
                                        </a>

                                    </td>
                                </tr>
                            </table>

                            <br/>
                            <br/>

                            <p style="font-size:15px;">{{ email_closing }}</p>

                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td bgcolor="#000000" style="border-radius:6px; border:3px solid #FFFFFF; line-height:18px;">

                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">

                                <tr>

                                    <!-- LEFT SPACER -->
                                    <td width="20"></td>

                                    <!-- CONTENT -->
                                    <td>

                                        <br/>
                                        <br/>

                                        <div style="
                                            font-size:18px;
                                            font-weight:600;
                                            color:#ffffff;
                                        ">
                                            {{ applicationTitle }}
                                        </div>

                                        <br/>
                                        <br/>

                                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td style="border-bottom:1px solid #373737;"></td>
                                            </tr>
                                        </table>

                                        <br/>
                                        <br/>

                                        <div style="
                                            font-size:10px;
                                            opacity:0.7;
                                            color:#ffffff;
                                            padding-bottom: 40px;
                                        ">
                                            {{ email_footer_message }}
                                        </div>

                                    </td>

                                    <!-- RIGHT SPACER -->
                                    <td width="20"></td>

                                </tr>

                            </table>

                        </td>

                    </tr>

                </table>

            </td>
            
        </tr>

    </table>

</body>
</html>
