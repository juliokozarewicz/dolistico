# ------------------------------------------------------------- (server init)

server {

    listen 80;
    server_name request.juliokozarewicz.com www.request.juliokozarewicz.com;

    # ------------------------------------------------------ (docker health init)

    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        break;
    }

    # ------------------------------------------------------- (docker health end)

    # ----------------------------------------------------------- (init security)

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # size request limit
    client_max_body_size 10M;

    # buffer
    proxy_buffering off;
    proxy_request_buffering off;

    # Block suspicious agents
    if ($bad_ua) {
        return 403;
    }

    # Timeout for requests from slow clients
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Improve HTTPS performance with session resumption
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 5m;

    # Enable server-side protection against BEAST attacks
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DH+3DES:!ADH:!AECDH:!MD5;

    # Disable SSLv3
    ssl_protocols TLSv1.2 TLSv1.3;

    # Enable OCSP stapling (http://blog.mozilla.org/security/2013/07/29/ocsp-stapling-in-firefox)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    location ~ /\.ht {
        deny all;
    }

    location ~ /\. {
        access_log off;
        log_not_found off;
        deny all;
    }

    gzip on;
    gzip_disable "msie6";

    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 4 32k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Malformed URL
    if ($request_uri ~* "\\x5C") {
        return 400;
    }

    # ------------------------------------------------------------ (end security)

    # ------------------------------------------------------------- (init errors)

    error_page 429 = @too_many_request;
    error_page 502 503 504 = @service_unavailable;

    error_page
        400 401 402 403 404 405 406 407 408
        409 410 411 412 413 414 415 416 417
        418 426 428 431 444 449 451
    = @bad_request;

    error_page
        500 501 505 506 507 508 510
    = @server_error;

    location @too_many_request {
        default_type application/json;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 429 '{"createdAt":"$time_iso8601", "statusCode": 429, "messageCode":"TOO_MANY_REQUESTS"}';
    }

    location @bad_request {
        default_type application/json;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 400 '{"createdAt":"$time_iso8601", "statusCode": 400, "messageCode":"BAD_REQUEST"}';
    }

    location @server_error {
        default_type application/json;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 500 '{"createdAt":"$time_iso8601", "statusCode": 500, "messageCode":"INTERNAL_SERVER_ERROR"}';
    }

    location @service_unavailable {
        default_type application/json;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"createdAt":"$time_iso8601", "statusCode": 503, "messageCode":"SERVICE_UNAVAILABLE"}';
    }

    # -------------------------------------------------------------- (end errors)

    include /etc/nginx/3_locations/*.conf;

}
# -------------------------------------------------------------- (server end)