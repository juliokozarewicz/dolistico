# -------------------------------------------------------------- ( server init )
spring.application.name=accounts
server.port=${ACCOUNTS_PORT}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
management.endpoints.web.exposure.include=health, refresh
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
server.forward-headers-strategy=framework
# --------------------------------------------------------------- ( server end )

# ---------------------------------------------------------------- ( logs init )
logging.level.root=ERROR
logging.structured.format.console=logstash
# ----------------------------------------------------------------- ( logs end )

# --------------------------------------------------------------- ( cache init )
spring.data.redis.host=cache
spring.data.redis.port=${CACHE_PORT}
spring.data.redis.username=${ACCOUNTS_CACHE_USER}
spring.data.redis.password=${ACCOUNTS_CACHE_PASSWORD}
# ---------------------------------------------------------------- ( cache end )

# ----------------------------------------------------------- ( messaging init )
# Kafka bootstrap servers
spring.kafka.bootstrap-servers=messaging:${MESSAGING_PORT}

# SASL security configuration
spring.kafka.properties.security.protocol=SASL_PLAINTEXT
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="${ACCOUNTS_MESSAGING_USER}" \
  password="${ACCOUNTS_MESSAGING_PASSWORD}";

# Consumer configuration
spring.kafka.consumer.group-id=${spring.application.name}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate

# Deserialization (generic, raw bytes)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.kafka.producer.properties.enable.idempotence=false
spring.kafka.producer.acks=all
spring.kafka.producer.retries=0
spring.kafka.producer.properties.request.timeout.ms=15000
spring.kafka.producer.properties.delivery.timeout.ms=15000
spring.kafka.producer.properties.max.block.ms=15000
spring.kafka.producer.properties.linger.ms=0
spring.kafka.producer.properties.batch.size=0
# ------------------------------------------------------------ ( messaging end )

# ------------------------------------------------------------ ( database init )
# JPA
spring.datasource.url=jdbc:${ACCOUNTS_DATABASE_TYPE}://database:${ACCOUNTS_DATABASE_PORT}/${ACCOUNTS_DATABASE_NAME}
spring.datasource.username=${ACCOUNTS_DATABASE_USER}
spring.datasource.password=${ACCOUNTS_DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=${ACCOUNTS_DATABASE_SCHEMA}

# Flyway
spring.flyway.enabled=true
spring.flyway.create-schemas=true
spring.flyway.schemas=${ACCOUNTS_DATABASE_SCHEMA}
spring.flyway.default-schema=${ACCOUNTS_DATABASE_SCHEMA}
spring.flyway.table=${ACCOUNTS_FLYWAY_TABLE}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true
# ------------------------------------------------------------- ( database end )