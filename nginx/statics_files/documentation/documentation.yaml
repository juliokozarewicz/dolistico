        "200":
          description: Category retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-04-13T15:22:10Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: CATEGORIES_RETRIEVED_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      idCreated:
                        type: string
                        format: uuid
                        example: 6a1dd3c0-2f6e-48fc-b995-45daf63ab942
                      createdAt:
                        type: string
                        format: date-time
                        example: "2026-04-10T14:37:37"
                      updatedAt:
                        type: string
                        format: date-time
                        example: "2026-04-10T14:37:37"
                      categoryName:
                        type: string
                        example: Work

    # CATEGORIES - UPDATE
    put:
      summary: Update category
      description: |-
        Updates the name of an existing category by its unique identifier.
        The category must belong to the authenticated user.
      tags:
        - Tasks
      security:
        - BearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier (UUID) of the category to update.
          schema:
            type: string
            format: uuid
            example: 6a1dd3c0-2f6e-48fc-b995-45daf63ab942
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryName
              properties:
                categoryName:
                  type: string
                  description: New name for the category. Must be unique per user.
                  minLength: 3
