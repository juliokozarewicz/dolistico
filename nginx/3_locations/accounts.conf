# ----------------------------------------------------------- (init accounts)

# [ ACCOUNTS - Signup ]
location /api/v1/accounts/signup {
    proxy_pass http://accounts_backend;
    limit_req zone=critical_zone burst=1 nodelay;
}

# [ ACCOUNTS - Activate Account ]
location /api/v1/accounts/activate-account {
    proxy_pass http://accounts_backend;
    limit_req zone=general_zone burst=5 nodelay;
}

