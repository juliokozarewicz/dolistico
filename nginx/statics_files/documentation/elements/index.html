<html lang="en-US">
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCUMENTATION</title>
    <link rel="icon" type="image/x-icon" href="src/assets/favicon.ico" />
    
    <!-- From web -->
    <!-- <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script> -->

    <!-- From local -->
    <script src="src/js/elements.js"></script>

    <link rel="stylesheet" href="src/css/elements.css" />
    
    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }

        #elements-container {
            height: 100vh;
            width: 100%;
        }

        a[href*='stoplight.io'][target='_blank'] {
            display: none !important;
            visibility: hidden !important;
        }

    </style>

</head>

<body>
    
    <elements-api
        id="elements-container"
        apiDescriptionUrl="documentation.yaml"
        router="hash"
        layout="sidebar"
    ></elements-api>

    <script>

        document.addEventListener('DOMContentLoaded', async () => {

            // Load config.json
            const configResponse = await fetch('./config.json');
            const REPLACE_MAP = await configResponse.json();

            // Load YAML
            const response = await fetch('./documentation.yaml');
            let yamlText = await response.text();

            // Apply dynamic PUBLIC_DOMAIN_REPLACE
            const PUBLIC_DOMAIN = `${window.location.origin}`;
            yamlText = yamlText.replace(/PUBLIC_DOMAIN_REPLACE/g, PUBLIC_DOMAIN);

            // Apply replacements
            if (REPLACE_MAP.APPLICATION_TITLE_REPLACE) {
                document.title = REPLACE_MAP.APPLICATION_TITLE_REPLACE.toUpperCase();
            }

            Object.entries(REPLACE_MAP).forEach(([key, value]) => {
                const regex = new RegExp(key, "g");
                yamlText = yamlText.replace(regex, value);
            });

            // Create blob URL
            const blob = new Blob([yamlText], { type: "text/yaml" });
            const yamlURL = URL.createObjectURL(blob);

            const apiEl = document.getElementById("elements-container");
            apiEl.apiDescriptionUrl = yamlURL;

        });

    </script>

</body>

</html>
