apiVersion: apps/v1
kind: Deployment

metadata:
    name: helloworld

spec:
    replicas: 1
    selector:
        matchLabels:
            app: helloworld
    template:
        metadata:
            labels:
                app: helloworld
        spec:
            containers:
                - name: helloworld
                  image: docker.io/library/helloworld:latest
                  imagePullPolicy: Never
                  ports:
                      - containerPort: 3001
                  envFrom:
                      - configMapRef:
                          name: app-config
                  livenessProbe:
                      httpGet:
                          path: /actuator/health/liveness
                          port: 3001
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 5