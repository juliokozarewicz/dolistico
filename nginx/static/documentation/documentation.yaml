  # Tasks - CREATE
  "/TASKS_BASE_URL_REPLACE":
    post:
      summary: Create task
      description: |-
        Creates a new task for the authenticated user. Every task belongs exclusively 
        to the authenticated user — it is not possible to access or modify another 
        user's data.
        
        **Business rules:**
        
        - `priority` must be between `1` (lowest) and `5` (highest).
        - `startTime` and `endTime` must always be provided together. Both must fall on the same calendar day, and `startTime` must be before `endTime`. When `dueDate` is also provided, all three must fall on the same day.
        - When `allDay` is `true`, `startTime` and `endTime` must not be provided.
        - `reminderTime` must not be after `dueDate`.
        - `reminderTime` and `notifyActive` must match: either both are set or neither is set. You can't have a reminder without notification being active, and you can't have notification active without a reminder time.
        - A task is considered a duplicate when the same user already has a task with the same `taskName` and `dueDate`.
      tags:
        - Tasks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taskName
                - priority
                - allDay
                - notifyActive
                - status
              properties:
                taskName:
                  type: string
                  description: Name of the task.
                  minLength: 3
                  maxLength: 255
                  example: Finish backend documentation
                description:
                  type: string
                  description: Optional detailed description of the task.
                  maxLength: 1000
                  example: Write the API documentation for the tasks module.
                category:
                  type: string
                  format: uuid
                  description: Optional categories identifier associated with the task.
                  example: 0f5b7c74-9c3b-4c3a-9a45-bcfd3c6d7a1e
                color:
                  type: string
                  description: Optional color label for the task.
                  maxLength: 20
                  example: blue
                priority:
                  type: integer
                  description: Priority level of the task ranging from 1 (lowest) to 5 (highest).
                  minimum: 1
                  maximum: 5
                  example: 3
                startTime:
                  type: string
                  format: date-time
                  description: Optional start time of the task.
                  example: "2026-03-11T09:00:00"
                endTime:
                  type: string
                  format: date-time
                  description: Optional end time of the task.
                  example: "2026-03-11T10:00:00"
                location:
                  type: string
                  description: Optional location related to the task.
                  maxLength: 255
                  example: Office meeting room
                allDay:
                  type: boolean
                  description: Indicates whether the task lasts all day.
                  example: false
                reminderTime:
                  type: string
                  format: date-time
                  description: Optional reminder time before the task due date.
                  example: "2026-03-11T08:30:00"
                notifyActive:
                  type: boolean
                  description: Indicates whether notifications are enabled for the task.
                  example: true
                status:
                  type: string
                  description: Current status of the task.
                  maxLength: 255
                  example: pending
                dueDate:
                  type: string
                  format: date-time
                  description: Optional due date for the task.
                  example: "2026-03-11T10:00:00"

      responses:
        "201":
          description: Task created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-03-11T11:20:40Z"
                  statusCode:
                    type: integer
                    example: 201
                  messageCode:
                    type: string
                    example: TASK_CREATED_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      idCreated:
                        type: string
                        format: uuid
                        example: 464140a1-cbec-4935-a604-e7decf33d6d9

    # Tasks - GET
    get:
      summary: Get tasks
      description: >-
        Retrieves a paginated list of tasks for the authenticated user.
