apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
    spec:
      initContainers:

        - name: wait-for-database
          image: busybox
          command: ["sh", "-c", "until nc -z database $DATABASE_PORT; do sleep 2; done"]
          env:
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DATABASE_PORT

        - name: wait-for-cache
          image: busybox
          command: ["sh", "-c", "until nc -z cache $CACHE_PORT; do sleep 2; done"]
          env:
            - name: CACHE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_PORT

        - name: wait-for-messaging
          image: busybox
          command: ["sh", "-c", "until nc -z messaging $MESSAGING_PORT; do sleep 2; done"]
          env:
            - name: MESSAGING_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MESSAGING_PORT

      containers:
        - name: accounts
          image: docker.io/library/accounts:latest
          imagePullPolicy: Never
          ports:
            - name: service-port
              containerPort: 3010

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: accounts-secrets

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: service-port
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5