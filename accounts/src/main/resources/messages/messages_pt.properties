# Delete account link
email_account_delete_subject=Excluir conta
email_account_delete_request_message=Recebemos uma solicitação para excluir permanentemente a sua conta. Lamentamos ver você partir. Antes de prosseguir, pedimos que confirme esta ação clicando no botão abaixo e seguindo as instruções apresentadas. Após a confirmação, sua conta e todos os dados associados, incluindo informações pessoais, configurações e histórico de utilização, serão removidos de forma definitiva e não poderão ser recuperados. Caso você não tenha solicitado esta exclusão, desconsidere esta mensagem e recomendamos revisar a segurança da sua conta imediatamente.
email_account_delete_confirm_message=Sua conta foi excluída com sucesso. Agradecemos sinceramente pelo tempo que você fez parte da nossa plataforma e por ter confiado em nossos serviços. Seus dados foram removidos permanentemente do nosso sistema. Esta ação é irreversível e a conta não poderá ser recuperada. Esperamos ter a oportunidade de receber você novamente no futuro.

