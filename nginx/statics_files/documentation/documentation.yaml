  # Accounts - DELETE ACCOUNT LINK
  "/ACCOUNTS_BASE_URL_REPLACE/delete-account-link":
    post:
      summary: Send account deletion confirmation link
      description: >-
        This endpoint allows authenticated users to request a link containing a token to delete their account. 
        The link will be sent to the user's email address. All refresh tokens will be revoked immediately after the request.
      tags:
        - Accounts
      security:
        - BearerAuth: []
      requestBody:
        required: false
      responses:
        "200":
          description: Account deletion link sent successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  statusMessage:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Check your email to delete your account.
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        example: /ACCOUNTS_BASE_URL_REPLACE/delete-account-link
                      next:
                        type: string
                        example: /ACCOUNTS_BASE_URL_REPLACE/delete-account

  # Accounts - DELETE ACCOUNT
  "/ACCOUNTS_BASE_URL_REPLACE/delete":
    post:
      summary: Delete account
      description: >-
        This endpoint completes the user account deactivation process by verifying a link containing a token sent to the user's email address. 
        Once the request is successful, the account is deactivated and enters a 30-day grace period before permanent deletion. 
        During this period, the user can reactivate the account by changing their password. All active sessions and tokens are revoked immediately. 
        A confirmation email is sent once the deactivation is successfully completed.
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: The verification token contained in the account deletion link sent to the user's email.
                  example: kjhgJHGJHgJHgy564ygfchgfchgFHGfhgfchGvcHGvctr765fhgfyut
      responses:
        "200":
          description: Account deactivation completed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  statusMessage:
                    type: string
                    example: success
                  message:
                    type: string
                    example: >-
                      Your account has been successfully deactivated! Your data will be deleted in 30 days. 
                      You can still reactivate your account by changing your password within this period.
                  links:
                    type: object
                    properties:
                      self:
                        type: string
                        example: /ACCOUNTS_BASE_URL_REPLACE/delete
                      next:
                        type: string
                        example: /ACCOUNTS_BASE_URL_REPLACE/signup
        "404":
          description: Invalid or expired token, or user not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  statusMessage:
                    type: string
                    example: error
                  message:
                    type: string
                    example: The link has expired. Please go through the process again.

  ############################################################# ( accounts end )

  ############################################################### ( tasks init )

  # CATEGORIES - CREATE
  "/TASKS_BASE_URL_REPLACE/category":
    post:
      summary: Create category
      description: |-
        Creates a new category for the authenticated user. Categories are used
        to organize and group tasks. Each category name must be unique per user.

        **Business rules:**

        - `categoryName` must not be blank, must have at least 3 characters, and must not exceed 255 characters.
        - A duplicate category is detected when the same user already has a category with the same `categoryName`.
      tags:
        - Tasks
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryName
              properties:
                categoryName:
                  type: string
                  description: Name of the category. Must be unique per user.
                  minLength: 3
                  maxLength: 255
                  example: Work
      responses:
        "201":
          description: Category created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-04-09T19:13:56Z"
                  statusCode:
                    type: integer
                    example: 201
                  messageCode:
                    type: string
                    example: CATEGORY_CREATED_SUCCESSFULLY
                  data:
                    type: object
                    properties:
                      idCreated:
                        type: string
                        format: uuid
                        example: 6a1dd3c0-2f6e-48fc-b995-45daf63ab942

    # CATEGORIES - GET
    get:
      summary: Get categories
      description: >-
        Retrieves a paginated list of categories for the authenticated user.
        All query parameters are optional and act as filters.
        Results are sorted by creation date in descending order.
      tags:
        - Tasks
      security:
        - BearerAuth: [ ]
      parameters:
        - name: pageSize
          in: query
          required: false
          description: Number of items per page. Must be between 1 and 100. Defaults to 50.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - name: pageNumber
          in: query
          required: false
          description: Page number to retrieve. Must be at most 100. Defaults to 1.
          schema:
            type: integer
            maximum: 100
            example: 1
        - name: categoryName
          in: query
          required: false
          description: Filter by category name. Must be between 3 and 255 characters. Special characters are not allowed.
          schema:
            type: string
            minLength: 3
            maxLength: 255
            example: credit card

      responses:
        "200":
          description: Categories retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-04-10T15:17:05Z"
                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: CATEGORIES_RETRIEVED_SUCCESSFULLY
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        idCreated:
                          type: string
                          format: uuid
                          example: 019d6df6-8819-7711-abb0-cba3cfe2a534
                        createdAt:
                          type: string
                          format: date-time
                          example: "2026-04-10T14:37:37"
                        updatedAt:
                          type: string
                          format: date-time
                          example: "2026-04-10T14:37:37"
                        categoryName:
                          type: string
                          example: credit card
                  meta:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 1
                      totalElementsCurrentPage:
                        type: integer
                        example: 1
                      pageSize:
                        type: integer
                        example: 50
                      totalElements:
                        type: integer
                        example: 1

