# Server
spring.application.name=accounts
server.port=${ACCOUNTS_PORT}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
management.endpoints.web.exposure.include=health, refresh
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true

# Logs
logging.level.root=ERROR
logging.file.name = ./src/main/resources/logs/logfile.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}, %-5level, %file [%method], %thread, %msg%n

# Email
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_ADDRESS_USER}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${EMAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${EMAIL_START_TTLS}

# Database
spring.datasource.url=jdbc:${ACCOUNTS_DATABASE_TYPE}://database:${DATABASE_PORT}/${ACCOUNTS_DATABASE_NAME}
spring.datasource.username=${ACCOUNTS_DATABASE_USER}
spring.datasource.password=${ACCOUNTS_DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=${ACCOUNTS_DATABASE_SCHEMA}
# Flyway
spring.flyway.enabled=true
spring.flyway.create-schemas=true
spring.flyway.schemas=${ACCOUNTS_DATABASE_SCHEMA}
spring.flyway.default-schema=${ACCOUNTS_DATABASE_SCHEMA}
spring.flyway.table=${ACCOUNTS_FLYWAY_TABLE}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=true

# Cache manager
spring.data.redis.host=cache
spring.data.redis.port=${CACHE_PORT}
spring.data.redis.username=${ACCOUNTS_CACHE_USER}
spring.data.redis.password=${ACCOUNTS_CACHE_PASSWORD}

# data streaming
spring.kafka.bootstrap-servers=messaging:${MESSAGING_PORT}
spring.kafka.properties.security.protocol=SASL_PLAINTEXT
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="${ACCOUNTS_MESSAGING_USER}" \
  password="${ACCOUNTS_MESSAGING_PASSWORD}";
spring.kafka.consumer.group-id=${spring.application.name}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.properties.enable.idempotence=false
spring.kafka.producer.acks=0
spring.kafka.producer.retries=0
spring.kafka.producer.properties.request.timeout.ms=2000
spring.kafka.producer.properties.delivery.timeout.ms=3000
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.linger.ms=0
spring.kafka.producer.properties.batch.size=0
spring.kafka.producer.properties.connections.max.idle.ms=1000