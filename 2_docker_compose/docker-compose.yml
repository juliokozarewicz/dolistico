services:

  # -------------------------------------------------------- (aux services init)

  nginx:
    build: ../nginx
    container_name: nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      helloworld:
        condition: service_healthy
      accounts:
        condition: service_healthy
      tasks:
        condition: service_healthy
    networks:
      - spring_net
    volumes:
      - accounts_static_files:/static/public:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "-A", "Docker-Healthcheck", "http://nginx/healthz" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  database:
    container_name: database
    env_file: .env
    image: postgres:17
    environment:
      POSTGRES_USER: ${DATABASE_ADMIN_USER}
      POSTGRES_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
    command: |
      bash -c '
        docker-entrypoint.sh postgres &
        until pg_isready -U ${DATABASE_ADMIN_USER} -d postgres -q; do sleep 1; done
        sleep 2
        psql -U ${DATABASE_ADMIN_USER} -d postgres -c "CREATE DATABASE keycloak" 2>/dev/null || true
        psql -U ${DATABASE_ADMIN_USER} -d postgres -c "CREATE DATABASE tasks_database" 2>/dev/null || true
        wait
      '
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - spring_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_ADMIN_USER} -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  cache:
    container_name: cache
    env_file:
      - .env
    image: redis:latest
    command: |
      bash -c '
        redis-server --port ${CACHE_PORT} --notify-keyspace-events Ex &
        REDIS_PID=$!
        sleep 2
        redis-cli -p ${CACHE_PORT} ACL SETUSER default on ">${CACHE_ADMIN_PASSWORD}"
        export REDISCLI_AUTH="${CACHE_ADMIN_PASSWORD}"
        redis-cli -p ${CACHE_PORT} ACL SETUSER ${CACHE_ADMIN_USER} on ">${CACHE_ADMIN_PASSWORD}" allkeys allchannels allcommands
        redis-cli -p ${CACHE_PORT} ACL SETUSER default off
        wait $REDIS_PID
      '
    ports:
      - "${CACHE_PORT}:${CACHE_PORT}"
    volumes:
      - cache_data:/data
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -p ${CACHE_PORT} -a ${CACHE_ADMIN_PASSWORD} --user ${CACHE_ADMIN_USER} PING 2>/dev/null | grep PONG" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  messaging:
    image: public.ecr.aws/bitnami/kafka:3.9
    container_name: messaging
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@messaging:9093
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:${MESSAGING_PORT},CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://messaging:${MESSAGING_PORT}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      KAFKA_CLIENT_USERS: ${MESSAGING_ADMIN_USER}
      KAFKA_CLIENT_PASSWORDS: ${MESSAGING_ADMIN_PASSWORD}
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${MESSAGING_PORT}:${MESSAGING_PORT}"
    volumes:
      - messaging_data:/bitnami/kafka
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "printf 'security.protocol=SASL_PLAINTEXT\nsasl.mechanism=SCRAM-SHA-256\nsasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${MESSAGING_ADMIN_USER}\" password=\"${MESSAGING_ADMIN_PASSWORD}\";\n' > /tmp/hc.properties && kafka-topics.sh --bootstrap-server localhost:${MESSAGING_PORT} --list --command-config /tmp/hc.properties 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:${DATABASE_PORT}/keycloak
      KC_DB_USERNAME: ${DATABASE_ADMIN_USER}
      KC_DB_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${KEYCLOAK_PORT}/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------- (aux services end)

  # ------------------------------------------------------------- (services end)

  helloworld:
    container_name: helloworld
    env_file:
      - .env
    build: ../helloworld
    ports:
      - "${HELLOWORLD_PORT}:${HELLOWORLD_PORT}"
    networks:
      - spring_net
    deploy:
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:${HELLOWORLD_PORT}/actuator/health/liveness || exit 1" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  emailservice:
    container_name: emailservice
    build: ../emailservice
    env_file:
      - .env
    ports:
      - "${EMAILSERVICE_PORT}:${EMAILSERVICE_PORT}"
    networks:
      - spring_net
    depends_on:
      messaging:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:${EMAILSERVICE_PORT}/actuator/health/liveness || exit 1" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  accounts:
    container_name: accounts
    build: ../accounts
    env_file:
      - .env
    ports:
      - "${ACCOUNTS_PORT}:${ACCOUNTS_PORT}"
    networks:
      - spring_net
    volumes:
      - accounts_static_files:/app/src/main/resources/static/public
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      messaging:
        condition: service_healthy
      emailservice:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:${ACCOUNTS_PORT}/actuator/health/liveness || exit 1" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  tasks:
    container_name: tasks
    build: ../tasks
    env_file:
      - .env
    ports:
      - "${TASKS_PORT}:${TASKS_PORT}"
    networks:
      - spring_net
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      messaging:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:${TASKS_PORT}/actuator/health/liveness || exit 1" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  # ------------------------------------------------------------- (services end)

volumes:
  database_data:
  cache_data:
  messaging_data:
  accounts_static_files:

networks:
  spring_net:
    driver: bridge