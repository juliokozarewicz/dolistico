# ----------------------------------------------------------- (init accounts)

# [ ACCOUNTS - Signup ]
location /api/v1/accounts/signup {
    proxy_pass http://accounts_backend;
    limit_req zone=critical_zone burst=1 nodelay;
}

# [ ACCOUNTS - Activate Account ]
location /api/v1/accounts/activate-account {
    proxy_pass http://accounts_backend;
    limit_req zone=general_zone burst=5 nodelay;
}

# [ ACCOUNTS - Activate Account *** STATIC *** ]
location /api/v1/accounts/static/active-account/ {
    alias /static/public/active-account/;
    index index.html;
    try_files $uri /index.html;
    add_header Cache-Control "public";
    limit_req zone=general_zone burst=50 nodelay;
}

# [ ACCOUNTS - Update Password Link ]
location /api/v1/accounts/update-password-link {
    proxy_pass http://accounts_backend;
    limit_req zone=critical_zone burst=1 nodelay;
}

# [ ACCOUNTS - Update Password ]
location /api/v1/accounts/update-password {
    proxy_pass http://accounts_backend;
    limit_req zone=general_zone burst=5 nodelay;
}

# [ ACCOUNTS - Update Password *** STATIC *** ]
location /api/v1/accounts/static/update-password/ {
    alias /static/public/update-password/;
    index index.html;
    try_files $uri /index.html;
    add_header Cache-Control "public";
    limit_req zone=general_zone burst=50 nodelay;
}

# [ ACCOUNTS - Login ]
location /api/v1/accounts/login {
    proxy_pass http://accounts_backend;
    limit_req zone=critical_zone burst=3 nodelay;
}

# [ ACCOUNTS - Login Confirmation ]
location /api/v1/accounts/login-confirmation {
    proxy_pass http://accounts_backend;
    limit_req zone=general_zone burst=1 nodelay;
}

# [ ACCOUNTS - Refresh Login ]
