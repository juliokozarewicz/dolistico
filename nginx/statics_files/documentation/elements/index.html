<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCUMENTATION</title>
    <style>

        body { margin: 0; padding: 0; }
        
        /* Disabled endpoints operations frame */
        /*
        .endpoints-card { 
            display: none !important; 
        }
        */

    </style>
</head>
<body>

    <script id="api-reference"></script>

    <script>

        document.addEventListener('DOMContentLoaded', async () => {
        
        // Load config.json
        const configResponse = await fetch('./config.json');
        if (!configResponse.ok) throw new Error('Falha ao carregar config.json');
        const REPLACE_MAP = await configResponse.json();

        // Load YAML
        const response = await fetch('./documentation.yaml');
        if (!response.ok) throw new Error('Falha ao carregar documentation.yaml');
        let yamlText = await response.text();

        // Apply subs
        const PUBLIC_DOMAIN = window.location.origin;
        yamlText = yamlText.replace(/PUBLIC_DOMAIN_REPLACE/g, PUBLIC_DOMAIN);

        if (REPLACE_MAP.APPLICATION_TITLE_REPLACE) {
            document.title = REPLACE_MAP.APPLICATION_TITLE_REPLACE.toUpperCase();
        }

        Object.entries(REPLACE_MAP).forEach(([key, value]) => {
            const regex = new RegExp(key, "g");
            yamlText = yamlText.replace(regex, value);
        });

        // Config then load
        const apiReferenceEl = document.getElementById('api-reference');

        apiReferenceEl.dataset.configuration = JSON.stringify({
            
            // Theme:
            ///////////////////////////////////////////////////////////////////////////////////////
            theme: 'kepler',
            layout: 'modern',
            spec: { content: yamlText },
            darkMode: true,
            forceDarkModeState: 'dark',
            
            // Read-only mode:
            ///////////////////////////////////////////////////////////////////////////////////////
            
            // Disable AI:
            agent: {
                disabled: true,
            },
            
            // Disable test/send buttom
            hideTestRequestButton: true,
            
            // disabled YAML download
            hideDownloadButton: true

        })

        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@scalar/api-reference';
        document.body.appendChild(script);

        });
    
    </script>

</body>
</html>
