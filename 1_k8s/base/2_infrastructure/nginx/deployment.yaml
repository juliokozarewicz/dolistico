apiVersion: apps/v1
kind: Deployment
metadata:
    name: nginx
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
                - name: nginx
                  image: docker.io/library/nginx:latest
                  imagePullPolicy: Never
                  ports:
                      - name: service-port
                        containerPort: 80
                  livenessProbe:
                      httpGet:
                          path: /nginx-status
                          port: service-port
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 10
                      failureThreshold: 5