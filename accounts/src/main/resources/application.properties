# Server
spring.application.name=accounts
server.port=${ACCOUNTS_PORT}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
management.endpoints.web.exposure.include=health, refresh
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true

# Logs
logging.level.root=ERROR
logging.file.name = ./src/main/resources/logs/logfile.log
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}, %-5level, %file [%method], %thread, %msg%n

# Cache manager
spring.data.redis.host=cache
spring.data.redis.port=${CACHE_PORT}
spring.data.redis.username=${ACCOUNTS_CACHE_USER}
spring.data.redis.password=${ACCOUNTS_CACHE_PASSWORD}