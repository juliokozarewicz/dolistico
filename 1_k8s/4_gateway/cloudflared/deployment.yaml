apiVersion: apps/v1
kind: Deployment
metadata:
    name: cloudflared
spec:
    replicas: 1
    selector:
        matchLabels:
            app: cloudflared
    template:
        metadata:
            labels:
                app: cloudflared
        spec:
            containers:
                - name: cloudflared
                  image: cloudflare/cloudflared:latest
                  args:
                      - tunnel
                      - run
                      - --token
                      - $(TUNNEL_TOKEN)
                  envFrom:
                      - configMapRef:
                            name: app-config
                      - secretRef:
                            name: cloudflared-secrets
                  resources:
                      requests:
                          cpu: "50m"
                          memory: "64Mi"
                      limits:
                          cpu: "200m"
                          memory: "128Mi"
            restartPolicy: Always