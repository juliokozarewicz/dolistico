openapi: 3.0.0
servers:
    - url: PUBLIC_DOMAIN_REPLACE
info:
    title: DOLISTICO
    version: "1.0"
    description: |-
        Dolistico is a lightweight and scalable microservice for managing 
        to-do tasks, built with Java and Spring. Designed to integrate 
        seamlessly into a microservices architecture, it allows users to 
        create, update, delete, and organize personal tasks and agendas 
        securely. With support for JWT authentication, user account 
        management, and features like due dates, categorization, and 
        ownership enforcement, Dolistico ensures that 
        task management is both secure and efficient.
        
        ## Additional templates you might find useful
        The official API documentation provides all the information you 
        need to understand, integrate, and test the available endpoints. 
        It includes details about authentication, parameters, request and 
        response examples, and explanations of the data models used. In addition
        to direct access to the official documentation, you can 
        explore the API in another way by using a different interface.
        
        ### Swagger:
        Swagger offers a user-friendly, interactive interface where you 
        can test API endpoints directly from your browser. It's ideal for 
        quickly exploring requests, responses, and available operations.
        Access it here:
        ```
        PUBLIC_DOMAIN_REPLACE/DOCUMENTATION_REPLACE/swagger
        ```

        ## User Login and Access Token Renewal Process
        The login process is carried out in two steps. First, the user sends 
        their email and password to the endpoint `PUBLIC_DOMAIN_REPLACE/accounts/login`. 
        If the credentials are valid and the account is active, a temporary 
        `userLoginToken` is generated and returned in the response, along with 
        a numeric PIN, which is sent to the user's email. Next, the user 
        sends the "userLoginToken" and the PIN received to the endpoint 
        `PUBLIC_DOMAIN_REPLACE/accounts/login-confirmation`. If both are valid, the system 
        returns an access token and a refresh token, which can be used to access 
        protected resources in the application. If any of the tokens or the 
        PIN are invalid, an appropriate error will be returned.

        **Authentication Error (401):**
        If the user is not authenticated (e.g., missing or invalid token), the response will be:

        ```json
        {
            "createdAt": "2026-02-27T19:53:14Z",
            "statusCode": 401,
            "messageCode": "INVALID_CREDENTIALS"
        }
        ```        

        ## Common responses

        **Bad request (400):**
        If the request is malformed or invalid, the response will be:

        ```json
        {
            "createdAt": "2026-02-27T20:00:02Z",
            "statusCode": 400,
            "messageCode": "BAD_REQUEST"
        }
        ```
        
        **Form field validation error (422):**
        If there are validation errors in the input fields, the response will include the fields and their respective error codes.

        ```json
        {
            "createdAt": "2026-02-27T19:55:12Z",
            "statusCode": 422,
            "messageCode": "UNPROCESSABLE_ENTITY",
            "fieldErrors": [
                {
                    "field": "subject",
                    "fieldMessageCode": "FIELD_CANNOT_REMAIN_EMPTY"
                },
                {
                    "field": "message",
                    "fieldMessageCode": "FIELD_CANNOT_REMAIN_EMPTY"
                }
            ]
        }
        ```

        **Rate limit exceeded (429):**
        If the user exceeds the allowed number of requests, the response will be:

        ```json
        {
            "createdAt": "2026-02-27T20:01:34+00:00",
            "statusCode": 429,
            "messageCode": "TOO_MANY_REQUESTS"
        }
        ```
        
        **Server error (500):**
        The service is online, but this specific endpoint is returning an error. The response will be:

        ```json
        {
            "createdAt": "2026-02-27T20:01:34+00:00",
            "statusCode": 500,
            "messageCode": "INTERNAL_SERVER_ERROR"
        }
        ```

        **Service Unavailable (503):**
        The service is temporarily unavailable, often due to maintenance or overload.

        ```json
        {
            "createdAt": "2026-02-27T20:01:34+00:00",
            "statusCode": 503,
            "messageCode": "SERVICE_UNAVAILABLE"
        }
        ```

components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

paths:

    # HELLO WORLD
    ######################################################################

    "/HELLOWORLD_BASE_URL_REPLACE":
        get:
            summary: Get hello world message
            description: >-
                Retrieves a hello world message. If the message parameter is not
                provided or is empty, the default value "Hello World!" will be returned.
                If the message equals "bad-message", a business rule error will be triggered.
            tags:
                - HELLO WORLD
            parameters:
                - name: message
                  in: query
                  required: false
                  description: Custom message to be validated and returned.
                  schema:
                      type: string
                      maxLength: 256
                      example: Hello from the API!
            responses:
                "200":
                    description: Successful response with validated hello world message.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    createdAt:
                                        type: string
                                        format: date-time
                                        example: 2026-02-27T20:10:15Z
                                    statusCode:
                                        type: integer
                                        example: 200
                                    messageCode:
                                        type: string
                                        example: HELLO_WORLD_SUCCESS
                                    data:
                                        type: object
                                        properties:
                                            message:
                                                type: string
                                                example: Hello from the API!
                                    links:
                                        type: object
                                        properties:
                                            self:
                                                type: string
                                                example: /HELLOWORLD_BASE_URL_REPLACE
                                            documentation:
                                                type: string
                                                example: /DOCUMENTATION_REPLACE
                                            swaggerDocumentation:
                                                type: string
                                                example: /DOCUMENTATION_REPLACE/swagger

                "401":
                    description: >-
                        Business rule violation. Triggered when the provided
                        message equals "bad-message".
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    createdAt:
                                        type: string
                                        format: date-time
                                        example: 2026-02-27T19:53:14Z
                                    statusCode:
                                        type: integer
                                        example: 401
                                    messageCode:
                                        type: string
                                        example: INVALID_CREDENTIALS

    ######################################################################

    # ACCOUNTS - SIGNUP
    ######################################################################

    "/ACCOUNTS_BASE_URL_REPLACE/signup":
        post:
            summary: Create a new user account
            description: >-
                Creates a new user account with the provided details such as name, email and password.
                An activation email is sent after account creation.
            tags:
                - ACCOUNTS
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: The name of the user.
                                    example: My Name
                                email:
                                    type: string
                                    description: The email address of the user.
                                    example: Email@hotmail.com
                                password:
                                    type: string
                                    description: >-
                                        The password for the new account. Must contain at least one uppercase letter,
                                        one number, and one special character.
                                    example: SecurePass123!
                            required:
                                - name
                                - email
                                - password
            responses:
                "201":
                    description: Account successfully created and activation email sent.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    statusCode:
                                        type: integer
                                        example: 201
                                    statusMessage:
                                        type: string
                                        example: success
                                    message:
                                        type: string
                                        example: >-
                                            Account created successfully, please activate your account through
                                            the link sent to your email.
                                    links:
                                        type: object
                                        properties:
                                            self:
                                                type: string
                                                example: /ACCOUNTS_BASE_URL_REPLACE/signup
                                            next:
                                                type: string
                                                example: /ACCOUNTS_BASE_URL_REPLACE/activate-email

    ######################################################################