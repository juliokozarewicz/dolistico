<!-- EMAIL FOOTER -->
<tr>
    <td bgcolor="#000000" style="border-radius:6px; border:2px solid #FFFFFF;">

        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">

            <!-- TOP SPACER -->
            <tr>
                <td height="40" style="line-height:40px; font-size:0;">&nbsp;</td>
            </tr>

            <tr>

                <!-- LEFT SPACER -->
                <td width="20"></td>

                <!-- FOOTER CONTENT -->
                <td>

                    <!-- APPLICATION TITLE -->
                    <div style="
                        font-size:18px;
                        font-weight:600;
                        color:#ffffff;
                    ">
                        {{applicationTitle}}
                    </div>

                    <br/>
                    <br/>

                    <!-- DIVIDER -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                            <td style="border-bottom:1px solid #373737;"></td>
                        </tr>
                    </table>

                    <br/>
                    <br/>

                    <!-- FOOTER MESSAGE -->
                    <div style="
                        font-size:10px;
                        opacity:0.7;
                        color:#ffffff;
                    ">
                        {{email_footer_message}}
                    </div>

                </td>

                <!-- RIGHT SPACER -->
                <td width="20"></td>

            </tr>

            <!-- BOTTOM SPACER -->
            <tr>
                <td height="40" style="line-height:40px; font-size:0;">&nbsp;</td>
            </tr>

        </table>

    </td>
</tr>
