services:

  # First, create the Docker network.
  # $ docker network create spring_net

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    networks:
      - spring_net
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

  vault:
    image: hashicorp/vault:1.15.2
    container_name: vault
    ports:
      - "${VAULT_PORT}:${VAULT_PORT}"
    environment:
      VAULT_ADDR: "http://vault:${VAULT_PORT}"
      VAULT_API_ADDR: "http://vault:${VAULT_PORT}"
    cap_add:
      - IPC_LOCK
    networks:
      - spring_net
    volumes:
      - vault_data:/vault/data
    command: >
      sh -c '
      echo "storage \"file\" { path = \"/vault/data\" }
      listener \"tcp\" { address = \"0.0.0.0:${VAULT_PORT}\" tls_disable = 1 }
      disable_mlock = true
      ui = true" > /vault/config/vault.hcl
      && vault server -config=/vault/config/vault.hcl
      '

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "messaging:${MESSAGING_PORT}"

      # SASL/SCRAM CONFIG
      KAFKA_TLS_ENABLED: "false"
      KAFKA_SASL_ENABLED: "true"
      KAFKA_SASL_MECHANISM: "SCRAM-SHA-256"
      KAFKA_SASL_USERNAME: "${MESSAGING_ADMIN_USER}"
      KAFKA_SASL_PASSWORD: "${MESSAGING_ADMIN_PASSWORD}"

    networks:
      - spring_net

volumes:
  vault_data:

networks:
  spring_net:
    # driver: bridge
    external: true