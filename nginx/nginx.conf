worker_processes auto;
worker_rlimit_nofile 65536;

events {
    use epoll;
    worker_connections 10240;
}

http {

    # keep alive
    keepalive_timeout 65;
    tcp_nopush on;
    tcp_nodelay on;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # resolver 10.43.0.10 ipv6=off valid=30s; # k3s
    resolver 10.96.0.10 ipv6=off valid=30s; # docker

    # -------------------------------------------- (upstream load balancer init)

    upstream helloworld_backend {
        zone helloworld_backend 64k;
        server helloworld.production.svc.cluster.local:3001;
    }

    upstream accounts_backend {
        zone accounts_backend 64k;
        server accounts.production.svc.cluster.local:3002;
    }

    upstream tasks_backend {
        zone tasks_backend 64k;
        server tasks.production.svc.cluster.local:3003;
    }

    # --------------------------------------------- (upstream load balancer end)

    # ------------------------------------- (rate limiting and bots config init)

    map $http_x_forwarded_for $real_client_ip {
        default $remote_addr;
        "~^(?P<first_ip>[^,]+)" $first_ip;
    }

    limit_req_zone $real_client_ip zone=critical_zone:100m rate=5r/m;
    limit_req_zone $real_client_ip zone=general_zone:150m rate=20r/m;
    limit_req_zone $real_client_ip zone=almost_free_zone:200m rate=100r/m;
    limit_conn_zone $real_client_ip zone=conn_limit_zone:100m;
    limit_conn conn_limit_zone 10;
    limit_req_status 429;

    # Blocking due to suspicious User-Agent (bots, scanners, etc.)
    map $http_user_agent $bad_ua {
        default 0;
        "~*(curl|wget|python-requests|masscan|nmap|nikto|sqlmap|bot|scraper)" 1;
        "~*Docker-Healthcheck" 0;
    }

    # Special log for DDOS attacks or limits reached
    log_format ddos '$remote_addr - $http_host "$request" $status [$time_local] '
                    '"$http_user_agent" "$http_referer" '
                    'req_time=$request_time upstream_time=$upstream_response_time';
    access_log /var/log/nginx/ddos.log ddos;

    # -------------------------------------- (rate limiting and bots config end)

    # ----------------------------------------------------- (proxy configs init)

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Cache for static routes (DDoS protection)
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m max_size=200m inactive=10m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # ------------------------------------------------------ (proxy configs end)

    server {

        listen 80;
        server_name request.juliokozarewicz.com www.request.juliokozarewicz.com;

        # ------------------------------------------------- (docker health init)

        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker
            allow 10.42.0.0/16;   # K3s pods
            allow 10.43.0.0/16;   # K3s services
            deny all;
            break;
        }

        # -------------------------------------------------- (docker health end)

        # ------------------------------------------------------ (init security)

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # size request limit
        client_max_body_size 10M;

        # buffer
        proxy_buffering off;
        proxy_request_buffering off;

        # Block suspicious agents
        if ($bad_ua) {
            return 403;
        }

        # Timeout for requests from slow clients
        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;

        # Improve HTTPS performance with session resumption
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 5m;

        # Enable server-side protection against BEAST attacks
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DH+3DES:!ADH:!AECDH:!MD5;

        # Disable SSLv3
        ssl_protocols TLSv1.2 TLSv1.3;

        # Enable OCSP stapling (http://blog.mozilla.org/security/2013/07/29/ocsp-stapling-in-firefox)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        location ~ /\.ht {
            deny all;
        }

        location ~ /\. {
            access_log off;
            log_not_found off;
            deny all;
        }

        gzip on;
        gzip_disable "msie6";

        gzip_comp_level 6;
        gzip_min_length 1100;
        gzip_buffers 4 32k;
        gzip_proxied any;
        gzip_types
            text/plain
            text/css
            text/js
            text/xml
            text/javascript
            application/javascript
            application/x-javascript
            application/json
            application/xml
            application/rss+xml
            image/svg+xml;

        # Malformed URL
        if ($request_uri ~* "\\x5C") {
            return 400;
        }

        # ------------------------------------------------------- (end security)

        # -------------------------------------------------------- (init errors)

        error_page 429 = @too_many_request;
        error_page 502 503 504 = @service_unavailable;

        error_page
            400 401 402 403 404 405 406 407 408
            409 410 411 412 413 414 415 416 417
            418 426 428 431 444 449 451
        = @bad_request;

        error_page
            500 501 505 506 507 508 510
        = @server_error;

        location @too_many_request {
            default_type application/json;
            add_header Content-Type 'application/json; charset=utf-8' always;
            return 429 '{"timestamp":"$time_iso8601", "statusCode": 429, "messageCode":"TOO_MANY_REQUESTS"}';
        }

        location @bad_request {
            default_type application/json;
            add_header Content-Type 'application/json; charset=utf-8' always;
            return 400 '{"timestamp":"$time_iso8601", "statusCode": 400, "messageCode":"BAD_REQUEST"}';
        }

        location @server_error {
            default_type application/json;
            add_header Content-Type 'application/json; charset=utf-8' always;
            return 500 '{"timestamp":"$time_iso8601", "statusCode": 500, "messageCode":"INTERNAL_SERVER_ERROR"}';
        }

        location @service_unavailable {
            default_type application/json;
            add_header Content-Type 'application/json; charset=utf-8' always;
            return 503 '{"timestamp":"$time_iso8601", "statusCode": 503, "messageCode":"SERVICE_UNAVAILABLE"}';
        }

        # --------------------------------------------------------- (end errors)

        # ------------------------------------------------ ( ***STATICS*** init)

        # ======================================================================
        # [ DOCUMENTATION - Stoplight Elements ]
        # ======================================================================

        location = /api/v1/documentation {
            return 301 /api/v1/documentation/;
        }

        location /api/v1/documentation/ {
            alias /static/public/documentation/elements/;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # ======================================================================
        # [ DOCUMENTATION - Swagger ]
        # ======================================================================

        location = /api/v1/documentation/swagger {
            return 301 /api/v1/documentation/swagger/;
        }

        location /api/v1/documentation/swagger {
            alias /static/public/documentation/swagger/;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # ======================================================================
        # [ ACCOUNTS ]
        # ======================================================================

        # [ ACCOUNTS - Avatar ]
        location /api/v1/accounts/static/uploads/avatar/ {
            alias /static/public/uploads/avatar/;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Activate Account ]
        location /api/v1/accounts/static/active-account/ {
            alias /static/public/active-account/;
            index index.html;
            try_files $uri /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # [ ACCOUNTS - Update Password ]
        location /api/v1/accounts/static/update-password/ {
            alias /static/public/update-password/;
            index index.html;
            try_files $uri /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # [ ACCOUNTS - Update Email ]
        location /api/v1/accounts/static/update-email/ {
            alias /static/public/update-email/;
            index index.html;
            try_files $uri /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # [ ACCOUNTS - Delete Account ]
        location /api/v1/accounts/static/delete-account/ {
            alias /static/public/delete-account/;
            index index.html;
            try_files $uri /index.html;
            add_header Cache-Control "public";
            limit_req zone=general_zone burst=50 nodelay;
        }

        # ------------------------------------------------- ( ***STATICS*** end)

        # --------------------------------------------------- (hello world init)

        # [ HELLO WORLD - Static Files ]
        location /api/v1/helloworld/static {
            proxy_pass http://helloworld_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ HELLO WORLD - Helloworld ]
        location /api/v1/helloworld {
            proxy_pass http://helloworld_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # ---------------------------------------------------- (hello world end)

        # ------------------------------------------------------ (accounts init)

        # [ ACCOUNTS - Signup ]
        location /api/v1/accounts/signup {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Activate Account ]
        location /api/v1/accounts/activate-account {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Update Password Link ]
        location /api/v1/accounts/update-password-link {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Update Password ]
        location /api/v1/accounts/update-password {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Login ]
        location /api/v1/accounts/login {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=3 nodelay;
        }

        # [ ACCOUNTS - Login Confirmation ]
        location /api/v1/accounts/login-confirmation {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Refresh Login ]
        location /api/v1/accounts/refresh-login {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Get Profile ]
        location /api/v1/accounts/get-profile {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Upload Avatar ]
        location /api/v1/accounts/upload-avatar {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Update Profile ]
        location /api/v1/accounts/update-profile {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Create Address ]
        location /api/v1/accounts/create-address {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Get Address ]
        location /api/v1/accounts/get-address {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Delete Address ]
        location /api/v1/accounts/delete-address {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Update Email Link ]
        location /api/v1/accounts/update-email-link {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Update Email ]
        location /api/v1/accounts/update-email {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Get Connected Devices ]
        location /api/v1/accounts/connected-devices {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=5 nodelay;
        }

        # [ ACCOUNTS - Delete Account Link ]
        location /api/v1/accounts/delete-account-link {
            proxy_pass http://accounts_backend;
            limit_req zone=critical_zone burst=1 nodelay;
        }

        # [ ACCOUNTS - Delete Account ]
        location /api/v1/accounts/delete {
            proxy_pass http://accounts_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # ------------------------------------------------------- (accounts end)

        # --------------------------------------------------------- (tasks init)

        # [ TASKS ]
        location /api/v1/tasks {
            proxy_pass http://tasks_backend;
            limit_req zone=general_zone burst=5 nodelay;
        }

        # ---------------------------------------------------------- (tasks end)

    }

}