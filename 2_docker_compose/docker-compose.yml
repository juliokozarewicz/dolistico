services:

  # ------------------------------------------------------------- (aux services init)

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    networks:
      - spring_net
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

  nginx:
    build: ../nginx
    container_name: nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      helloworld:
        condition: service_healthy
      accounts:
        condition: service_healthy
      tasks:
        condition: service_healthy
    networks:
      - spring_net
    volumes:
      - accounts_static_files:/static/public:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "-A", "Docker-Healthcheck", "http://nginx/healthz" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  database:
    container_name: database
    env_file:
      - .env
    image: postgres:17
    environment:
      POSTGRES_USER: ${DATABASE_ADMIN_USER}
      POSTGRES_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_ADMIN_USER} -d postgres" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  database-init:
    container_name: database-init
    image: postgres:17
    env_file:
      - .env
    volumes:
      - ./config/database/init.sh:/init.sh
    networks:
      - spring_net
    depends_on:
      database:
        condition: service_healthy
    entrypoint: [ "bash", "/init.sh" ]
    restart: on-failure

  cache:
    container_name: cache
    env_file:
      - .env
    image: redis:latest
    command: redis-server --port ${CACHE_PORT} --notify-keyspace-events Ex
    volumes:
      - cache_data:/data
    ports:
      - "${CACHE_PORT}:${CACHE_PORT}"
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -p ${CACHE_PORT} PING | grep PONG" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  cache-init:
    container_name: cache-init
    image: redis:latest
    env_file:
      - .env
    volumes:
      - ./config/cache/init.sh:/init.sh
    networks:
      - spring_net
    depends_on:
      cache:
        condition: service_healthy
    entrypoint: [ "bash", "/init.sh" ]
    restart: on-failure

  messaging:
    image: public.ecr.aws/bitnami/kafka:3.9
    container_name: messaging
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@messaging:9093
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:${MESSAGING_PORT},CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://messaging:${MESSAGING_PORT}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      KAFKA_CLIENT_USERS: ${MESSAGING_ADMIN_USER}
      KAFKA_CLIENT_PASSWORDS: ${MESSAGING_ADMIN_PASSWORD}
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_CFG_SUPER_USERS: User:${MESSAGING_ADMIN_USER};User:ANONYMOUS
      KAFKA_CFG_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
    ports:
      - "${MESSAGING_PORT}:${MESSAGING_PORT}"
    volumes:
      - messaging_data:/bitnami/kafka
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "printf 'security.protocol=SASL_PLAINTEXT\nsasl.mechanism=SCRAM-SHA-256\nsasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${MESSAGING_ADMIN_USER}\" password=\"${MESSAGING_ADMIN_PASSWORD}\";\n' > /tmp/hc.properties && kafka-topics.sh --bootstrap-server localhost:${MESSAGING_PORT} --list --command-config /tmp/hc.properties 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  messaging-init:
    container_name: messaging-init
    image: apache/kafka:latest
    env_file:
      - .env
    volumes:
      - ./config/messaging/init.sh:/init.sh
    networks:
      - spring_net
    depends_on:
      messaging:
        condition: service_healthy
    entrypoint: [ "bash", "/init.sh" ]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:${DATABASE_PORT}/${KEYCLOAK_DATABASE_NAME}?currentSchema=${KEYCLOAK_DATABASE_SCHEMA}
      KC_DB_USERNAME: ${KEYCLOAK_DATABASE_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DATABASE_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    depends_on:
      database-init:
        condition: service_completed_successfully
    networks:
      - spring_net
    healthcheck:
      test: [ "CMD-SHELL", "/opt/keycloak/bin/kc.sh show-config >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  keycloak-init:
    container_name: keycloak-init
    image: curlimages/curl:latest
    env_file:
      - .env
    volumes:
      - ./config/keycloak/init.sh:/init.sh
    networks:
      - spring_net
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: [ "sh", "/init.sh" ]
  # ------------------------------------------------------------- (aux services end)

  # ----------------------------------------------------------- ( main services init)
  helloworld:
    container_name: helloworld
    env_file:
      - .env
    build: ../helloworld
    expose:
      - "${HELLOWORLD_PORT}"
    networks:
      - spring_net
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${HELLOWORLD_PORT}/actuator/health/liveness || exit 1"]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  emailservice:
    container_name: emailservice
    build: ../emailservice
    env_file:
      - .env
    expose:
      - "${EMAILSERVICE_PORT}"
    networks:
      - spring_net
    depends_on:
      messaging-init:
          condition: service_completed_successfully
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${EMAILSERVICE_PORT}/actuator/health/liveness || exit 1"]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  accounts:
    container_name: accounts
    build: ../accounts
    env_file:
      - .env
    expose:
      - "${ACCOUNTS_PORT}"
    networks:
      - spring_net
    volumes:
      - accounts_static_files:/app/src/main/resources/static/public
    depends_on:
      database-init:
        condition: service_completed_successfully
      cache-init:
        condition: service_completed_successfully
      messaging-init:
        condition: service_completed_successfully
      keycloak-init:
        condition: service_completed_successfully
      emailservice:
        condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${ACCOUNTS_PORT}/actuator/health/liveness || exit 1"]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  tasks:
    container_name: tasks
    build: ../tasks
    env_file:
      - .env
    ports:
      - "${TASKS_PORT}:${TASKS_PORT}"
    networks:
      - spring_net
    depends_on:
      database-init:
        condition: service_completed_successfully
      messaging-init:
        condition: service_completed_successfully
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:${TASKS_PORT}/actuator/health/liveness || exit 1"]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s
  # ------------------------------------------------------------ ( main services end)

volumes:
  database_data:
  cache_data:
  messaging_data:
  accounts_static_files:

networks:
  spring_net:
    name: spring_net
    driver: bridge