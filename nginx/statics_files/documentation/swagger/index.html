<!DOCTYPE html>
<html lang="en-US">

<head>

    <meta charset="UTF-8" />
    <title>APPLICATION_TITLE_REPLACE</title>
    <link rel="icon" type="image/x-icon" href="src/assets/favicon.ico" />

    <!-- From server -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@3.52.5/swagger-ui-bundle.js"></script> -->

    <script src="src/js/swagger.js"></script>
    <link rel="stylesheet" type="text/css" href="src/css/swagger.css" />

    <style>
        #swagger-ui {
            max-width: 80%;
            margin: 0 auto;
        }
    </style>

</head>

<body>

    <div id="swagger-ui"></div>

    <script>

        document.addEventListener("DOMContentLoaded", async () => {

            // Load config.json
            const configResponse = await fetch("./config.json");
            const REPLACE_MAP = await configResponse.json();

            // Load YAML
            const yamlResponse = await fetch("./documentation.yaml");
            let yamlText = await yamlResponse.text();

            // Apply replacements
            if (REPLACE_MAP.APPLICATION_TITLE_REPLACE) {
                document.title = REPLACE_MAP.APPLICATION_TITLE_REPLACE.toUpperCase();
            }

            Object.entries(REPLACE_MAP).forEach(([key, value]) => {
                const regex = new RegExp(key, "g");
                yamlText = yamlText.replace(regex, value);
            });

            // Create blob URL
            const blob = new Blob([yamlText], { type: "text/yaml" });
            const yamlURL = URL.createObjectURL(blob);

            SwaggerUIBundle({
                url: yamlURL,
                dom_id: "#swagger-ui",
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.presets.standalone
                ],
                layout: "BaseLayout",
            });

        });

    </script>

</body>

</html>
