                  statusCode:
                    type: integer
                    example: 200
                  messageCode:
                    type: string
                    example: TASKS_RETRIEVED_SUCCESSFULLY
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        idCreated:
                          type: string
                          format: uuid
                          example: 464140a1-cbec-4935-a604-e7decf33d6d9
                        createdAt:
                          type: string
                          format: date-time
                          example: "2026-03-11T09:00:00"
                        updatedAt:
                          type: string
                          format: date-time
                          example: "2026-03-11T10:00:00"
                        taskName:
                          type: string
                          example: Finish backend documentation
                        description:
                          type: string
                          example: Write the API documentation for the tasks module.
                        category:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                              example: 0f5b7c74-9c3b-4c3a-9a45-bcfd3c6d7a1e
                            categoryName:
                              type: string
                              example: Work
                        color:
                          type: string
                          example: blue
                        priority:
                          type: integer
                          example: 3
