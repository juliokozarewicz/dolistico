# Update email link
email_account_update_email_subject=Alteração de endereço de email
email_account_update_email_request_url_message=Clique no botão abaixo para alterar o endereço de e-mail associado à sua conta. Em seguida, informe o código de verificação enviado para o novo endereço de e-mail quando solicitado. Caso você não tenha solicitado esta alteração, recomendamos redefinir sua senha imediatamente para garantir a segurança da sua conta.
